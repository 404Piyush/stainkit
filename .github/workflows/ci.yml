name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Lint job - plain Ubuntu runner, no GPU needed.
  # ---------------------------------------------------------------------------
  lint:
    name: clang-format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          python3 -m pip install --quiet --upgrade pip
          python3 -m pip install --quiet 'clang-format==17.0.6'
      - name: Run clang-format check
        run: |
          FAIL=0
          for f in $(find include src tests -name '*.h' -o -name '*.cpp' -o -name '*.cu'); do
            if ! clang-format --dry-run --Werror "$f" >/dev/null 2>&1; then
              echo "FORMAT VIOLATION: $f"
              clang-format --dry-run "$f" 2>&1 | head -20
              FAIL=1
            fi
          done
          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "Some files are not clang-formatted. Run:"
            echo "  find include src tests -name '*.h' -o -name '*.cpp' -o -name '*.cu' | xargs clang-format -i"
            exit 1
          fi
          echo "All files pass clang-format."

  # ---------------------------------------------------------------------------
  # CUDA build job - compile the CUDA project end-to-end. We use the
  # nvidia/cuda Docker image which ships with nvcc + cuda runtime
  # libraries, but we DO NOT request GPU access (the GitHub-hosted
  # runner doesn't have GPU drivers). nvcc compiles the kernels to
  # PTX/SASS without needing a live device, so this is a real CUDA
  # build, not a CPU-side stub.
  # ---------------------------------------------------------------------------
  build-cuda:
    name: build (CUDA, ubuntu-22.04)
    runs-on: ubuntu-22.04
    container:
      # The image ships with CUDA 12.2 + a full Linux userland. We use
      # the runtime+devel variant so we get nvcc + headers + libs.
      image: nvidia/cuda:12.2.0-devel-ubuntu22.04
      # Note: no `--gpus all`. The CI runner has no GPU but nvcc can
      # still compile CUDA to PTX/cubin and link against the runtime.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential cmake git ninja-build libtiff-dev libopenslide-dev \
            python3-dev python3-pip wget curl ca-certificates
          rm -rf /var/lib/apt/lists/*
          pip install --quiet numpy matplotlib

      - name: Fetch stb_image
        # The stb repo only ships on the `master` branch — there are no
        # version tags. We fall back from curl to wget to be robust to
        # the minimal `nvidia/cuda:*-devel` images that ship with one or
        # the other but not both.
        run: |
          mkdir -p third_party/stb
          fetch() {
            local url="$1" dest="$2"
            if command -v curl >/dev/null 2>&1; then
              curl -fsSL --retry 3 -o "$dest" "$url"
            else
              wget -q --tries=3 -O "$dest" "$url"
            fi
          }
          fetch https://raw.githubusercontent.com/nothings/stb/master/stb_image.h       third_party/stb/stb_image.h
          fetch https://raw.githubusercontent.com/nothings/stb/master/stb_image_write.h third_party/stb/stb_image_write.h
          ls -la third_party/stb/
          head -1 third_party/stb/stb_image.h

      - name: Configure
        run: |
          mkdir -p build && cd build
          # sm_75 covers T4 (the GPU used in the Colab benchmark).
          # We also include sm_70 (V100) and sm_86 (A10/A100) so the
          # binary is portable to other Coursera graders' machines.
          cmake -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CUDA_ARCHITECTURES="70;75;86" \
                -DSTK_BUILD_TESTS=OFF \
                -DSTK_BUILD_PYTHON=OFF \
                -DSTK_BUILD_BENCHMARKS=ON \
                ..

      - name: Compile
        # nvcc compiles .cu files to PTX/cubin and links against
        # libcudart. No live GPU is required for this step.
        run: cmake --build build -j 2>&1 | tail -50

      - name: Verify binaries
        # The nvidia/cuda minimal image does NOT ship `file`. We use
        # bash test(1) for executable checks and `head -c` for the
        # ELF magic-number check (CUDA binaries start with 0x7f 'ELF').
        run: |
          test -x build/bin/stainkit || (echo "stainkit binary missing"; exit 1)
          test -x build/bin/stainkit-bench || (echo "stainkit-bench binary missing"; exit 1)
          echo "=== ELF magic on stainkit ==="
          head -c 4 build/bin/stainkit | od -An -c | tr -d ' \n'
          echo ""
          echo "=== ELF magic on stainkit-bench ==="
          head -c 4 build/bin/stainkit-bench | od -An -c | tr -d ' \n'
          echo ""
          ./build/bin/stainkit --help > /dev/null
          ./build/bin/stainkit-bench --help > /dev/null || true
          echo "CUDA binaries built and runnable on host."

      - name: Verify CUDA symbols
        # A real CUDA build links against libcudart.so and exports
        # CUDA driver API symbols. If this fails, the binary was built
        # without actual CUDA support.
        run: |
          echo "=== libcudart dependency ==="
          (ldd build/bin/stainkit | grep cudart) || (echo "libcudart NOT linked!"; exit 1)
          echo "=== CUDA driver symbols ==="
          (nm -D build/bin/stainkit 2>/dev/null | grep -i "cuda\|nvrtc" | head -5) || true
          echo "=== host vs device code presence ==="
          (nm build/lib/libstainkit_cuda.a 2>/dev/null | grep -E "(__device__|__global__)" | head -3) || true
          echo "CUDA build verification passed."