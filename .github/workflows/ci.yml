name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04]
    container:
      image: nvidia/cuda:12.2.0-devel-ubuntu22.04
      options: --gpus all
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential cmake git ninja-build libtiff-dev libopenslide-dev \
            python3-dev python3-pip wget ca-certificates
          rm -rf /var/lib/apt/lists/*
          pip install --quiet numpy matplotlib

      - name: Fetch stb_image
        run: |
          mkdir -p third_party/stb
          wget -qO third_party/stb/stb_image.h \
            https://raw.githubusercontent.com/nothings/stb/v2.28/stb_image.h
          wget -qO third_party/stb/stb_image_write.h \
            https://raw.githubusercontent.com/nothings/stb/v2.28/stb_image_write.h

      - name: Configure
        run: |
          mkdir -p build && cd build
          cmake -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_CUDA_ARCHITECTURES=75 \
                -DSTK_BUILD_TESTS=ON \
                -DSTK_BUILD_PYTHON=ON \
                ..

      - name: Build
        run: cmake --build build -j

      - name: Tests
        run: |
          cd build
          ctest --output-on-failure --timeout 120

  lint:
    name: clang-format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add - 2>/dev/null
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" > /etc/apt/sources.list.d/llvm.list
          apt-get update
          apt-get install -y clang-format-17
      - name: Run clang-format check
        run: |
          if ! command -v clang-format-17 >/dev/null; then
            echo "clang-format-17 not available, falling back to clang-format"
            CLANG_FORMAT=clang-format
          else
            CLANG_FORMAT=clang-format-17
          fi
          find include src tests -name '*.h' -o -name '*.cpp' -o -name '*.cu' \
            | xargs -I{} sh -c '$CLANG_FORMAT --dry-run --Werror "{}"'
